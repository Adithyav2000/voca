# VOCA — API + Frontend + PostgreSQL + Redis.
# • Default: docker compose up — API at http://localhost:8000, frontend at http://localhost:5173.
# • Set FRONTEND_ORIGIN=http://localhost:5173 in .env so Google login redirects to the app.
# • OpenAI webhooks: docker compose --profile expose up — ngrok exposes the API so the voice agent can call
#   /api/check-availability and /api/book-slot. Set NGROK_AUTHTOKEN in .env. Then: docker logs voca-ngrok
#   and use that HTTPS URL in OpenAI function calling.

services:
  api:
    build:
      context: ./voca-backend
      dockerfile: Dockerfile
    container_name: voca-api
    # --http h11: avoid 400 "invalid header name" when OpenAI/ngrok send headers httptools rejects
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--http", "h11"]
    ports:
      - "8000:8000"
    volumes:
      - ./voca-backend/app:/app/app
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./voca-frontend
      dockerfile: Dockerfile
    container_name: voca-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./voca-frontend:/app
      # Isolate node_modules so container installs Linux binaries (host is macOS)
      - /app/node_modules
    env_file:
      - ./.env
    environment:
      - VITE_PROXY_TARGET=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: voca-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: voca
    volumes:
      - voca_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d voca"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: voca-redis
    ports:
      - "6379:6379"
    volumes:
      - voca_redis_data:/data

  # OpenAI: public tunnel so the voice agent can POST to /api/check-availability and /api/book-slot.
  # Option A: ngrok. Requires NGROK_AUTHTOKEN in .env.
  # Option B: cloudflared (no token). Use if ngrok returns 400 "invalid header name".
  # Start with: docker compose --profile expose up. Then: docker compose logs ngrok  OR  docker compose logs cloudflared
  ngrok:
    image: ngrok/ngrok:latest
    container_name: voca-ngrok
    command: ["http", "voca-api:8000", "--log=stdout"]
    env_file:
      - ./.env
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      - api
    restart: "no"
    profiles:
      - expose

  # Alternative tunnel (no auth token). Use this URL in OpenAI if ngrok gives 400 invalid header name.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: voca-cloudflared
    command: ["tunnel", "--no-autoupdate", "--url", "http://voca-api:8000"]
    depends_on:
      - api
    restart: "no"
    profiles:
      - expose

volumes:
  voca_db_data:
  voca_redis_data:
